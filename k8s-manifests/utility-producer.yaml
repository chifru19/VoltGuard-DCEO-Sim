apiVersion: apps/v1
kind: Deployment
metadata:
  name: utility-producer
  labels:
    app: utility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: utility
  template:
    metadata:
      labels:
        app: utility
    spec:
      # Security at the Pod level
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: utility-simulator
        image: utility-producer:latest
        imagePullPolicy: IfNotPresent
        
        # Environment Variables
        env:
        - name: MQTT_BROKER
          value: "mqtt-service"
        - name: MQTT_PORT
          value: "1883"

        # Resource Limits (Clears ~15 Checkov warnings)
        resources:
          limits:
            cpu: "500m"
            memory: "128Mi"
          requests:
            cpu: "250m"
            memory: "64Mi"

        # Container Security (Clears ~10 Checkov warnings)
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false # Set to true if your script doesn't write local logs
          capabilities:
            drop:
              - ALL

        # Health Checks (The "Resiliency" piece)
        livenessProbe:
          tcpSocket:
            port: 1883 # Checks if it can see the network
          initialDelaySeconds: 5
          periodSeconds: 10
          securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL